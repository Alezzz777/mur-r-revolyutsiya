<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Good Deed of the Day 🐾 Purr-r-revolution</title>
  <meta name="description" content="One small kind act a day makes the world softer. From the cat, with love." />
  <meta property="og:title" content="Good Deed of the Day 🐾" />
  <meta property="og:description" content="The cat suggests one small kind act. Will you do it?" />
  <meta property="og:url" content="https://mur-r-revolyutsiya.onrender.com/en-kindness.html" />
  <meta property="og:type" content="website" />
  <style>
    :root {
      --bg1: #ffe9f0; --bg2: #fff6e6;
      --ink: #3a2b32; --accent: #ff7eb3;
      --accent-dark: #e85b97; --card: #fffdfb;
    }
    body.night-mode {
      --bg1: #1a1020; --bg2: #21182e;
      --ink: #f0e6f6; --accent: #d47ab8;
      --accent-dark: #c45fa0; --card: #2a1f35;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 24px 16px 64px;
    }
    .lang-switch { align-self: flex-end; margin-bottom: 8px; font-size: .88rem; }
    .lang-switch a { color: var(--accent-dark); text-decoration: none; font-weight: 600; opacity: .75; }
    .lang-switch a:hover { opacity: 1; }
    .back { align-self: flex-start; margin-bottom: 16px; text-decoration: none; color: var(--accent-dark); font-weight: 600; font-size: 0.95rem; opacity: 0.85; transition: opacity .2s; }
    .back:hover { opacity: 1; }
    h1 { font-size: clamp(1.8rem, 5vw, 2.8rem); text-align: center; margin: 0 0 6px; }
    .sub { text-align: center; font-size: 1rem; opacity: .7; margin: 0 0 32px; }
    .card { background: var(--card); border-radius: 28px; box-shadow: 0 12px 40px rgba(232,91,151,.18); padding: 32px 28px; max-width: 520px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .cat-img { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; box-shadow: 0 6px 20px rgba(232,91,151,.2); }
    .cat-img.happy { animation: catJoy .5s ease-in-out; }
    @keyframes catJoy { 0%,100%{transform:scale(1) rotate(0deg)} 30%{transform:scale(1.08) rotate(-4deg)} 60%{transform:scale(1.08) rotate(4deg)} }
    .date-label { font-size: .8rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--accent-dark); opacity: .7; }
    .deed-card { background: linear-gradient(135deg, #fff0f6, #fff8ee); border-radius: 20px; padding: 22px 24px; text-align: center; width: 100%; }
    body.night-mode .deed-card { background: linear-gradient(135deg, #2e1a2e, #261a20); }
    .deed-icon { font-size: 2.8rem; margin-bottom: 10px; display: block; }
    .deed-text { font-size: 1.15rem; font-weight: 600; line-height: 1.55; margin: 0 0 8px; }
    .deed-hint { font-size: .9rem; opacity: .7; line-height: 1.5; margin: 0; }
    .done-btn { font: inherit; font-weight: 700; font-size: 1.05rem; background: var(--accent); color: white; border: none; border-radius: 999px; padding: 14px 32px; cursor: pointer; box-shadow: 0 6px 18px rgba(255,126,179,.45); transition: background .2s, transform .12s; }
    .done-btn:hover { background: var(--accent-dark); }
    .done-btn:active { transform: scale(.97); }
    .done-btn.did-it { background: #4caf82; box-shadow: 0 6px 18px rgba(76,175,130,.35); }
    .done-counter { font-size: .88rem; opacity: .65; text-align: center; }
    .done-counter span { font-weight: 700; color: var(--accent-dark); }
    .streak-note { font-size: .88rem; text-align: center; min-height: 1.3em; color: var(--accent-dark); font-weight: 600; }

    /* --- BADGES --- */
    .badges-section { max-width: 520px; width: 100%; margin-top: 28px; }
    .badges-title { font-size: .85rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; color: var(--accent-dark); opacity: .65; margin: 0 0 14px 4px; }
    .badges-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
    .badge-card { background: var(--card); border-radius: 20px; box-shadow: 0 4px 18px rgba(232,91,151,.10); padding: 16px 14px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 6px; position: relative; transition: transform .15s, box-shadow .2s; cursor: default; }
    .badge-card.earned { cursor: pointer; }
    .badge-card.earned:hover { transform: translateY(-3px); box-shadow: 0 8px 26px rgba(232,91,151,.22); }
    .badge-card.locked { opacity: .38; filter: grayscale(.7); }
    .badge-icon { font-size: 2.2rem; line-height: 1; }
    .badge-name { font-size: .82rem; font-weight: 700; line-height: 1.3; }
    .badge-req { font-size: .72rem; opacity: .6; line-height: 1.3; }
    .badges-empty { grid-column: 1 / -1; text-align: center; font-size: .9rem; opacity: .55; padding: 16px 0 4px; font-style: italic; margin: 0; }
    @keyframes badgePop { 0%{transform:scale(.5) rotate(-8deg);opacity:0} 60%{transform:scale(1.12) rotate(3deg);opacity:1} 100%{transform:scale(1) rotate(0deg)} }
    .badge-card.badge-animate { animation: badgePop .5s cubic-bezier(.34,1.56,.64,1) both; }

    .badge-modal-overlay { position: fixed; inset: 0; background: rgba(58,43,50,.55); display: flex; align-items: center; justify-content: center; z-index: 9998; opacity: 0; transition: opacity .25s; pointer-events: none; }
    .badge-modal-overlay.open { opacity: 1; pointer-events: all; }
    .badge-modal { background: var(--card); border-radius: 28px; box-shadow: 0 20px 60px rgba(232,91,151,.3); padding: 36px 28px; max-width: 340px; width: 90%; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 14px; transform: scale(.85); transition: transform .25s cubic-bezier(.34,1.56,.64,1); }
    .badge-modal-overlay.open .badge-modal { transform: scale(1); }
    .badge-modal .modal-icon { font-size: 3.5rem; line-height: 1; }
    .badge-modal .modal-name { font-size: 1.4rem; font-weight: 800; margin: 0; }
    .badge-modal .modal-desc { font-size: .95rem; opacity: .75; margin: 0; line-height: 1.5; }
    .modal-share-btn { font: inherit; font-weight: 700; font-size: .95rem; background: var(--accent); color: white; border: none; border-radius: 999px; padding: 12px 28px; cursor: pointer; box-shadow: 0 4px 14px rgba(255,126,179,.4); transition: background .2s; }
    .modal-share-btn:hover { background: var(--accent-dark); }
    .modal-close { font: inherit; font-size: .88rem; opacity: .55; background: none; border: none; cursor: pointer; color: var(--ink); }
    .modal-close:hover { opacity: 1; }

    @keyframes floatHeart { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-80px) scale(1.3);opacity:0} }
    .float-heart { position: fixed; pointer-events: none; font-size: 1.6rem; animation: floatHeart 1s ease-out forwards; z-index: 9999; }
    .nav-links { max-width: 520px; width: 100%; margin-top: 32px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .nav-link { display: inline-block; padding: 10px 20px; border-radius: 999px; background: var(--card); color: var(--accent-dark); text-decoration: none; font-weight: 600; font-size: .9rem; box-shadow: 0 4px 14px rgba(232,91,151,.12); transition: transform .12s, box-shadow .2s; }
    .nav-link:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(232,91,151,.2); }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--ink); color: white; padding: 12px 22px; border-radius: 999px; opacity: 0; transition: all .3s; z-index: 9999; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    footer { margin-top: 40px; opacity: .6; font-size: .88rem; text-align: center; }
    .scroll-top { position:fixed; bottom:28px; right:20px; z-index:999; width:44px; height:44px; border-radius:50%; background:var(--card); border:none; cursor:pointer; font-size:1.4rem; box-shadow:0 4px 16px rgba(232,91,151,.25); opacity:0; transform:translateY(12px); transition:opacity .3s,transform .3s; display:flex; align-items:center; justify-content:center; }
    .scroll-top.visible { opacity:1; transform:translateY(0); }
    .scroll-top:hover { box-shadow:0 6px 20px rgba(232,91,151,.4); transform:translateY(-2px) !important; }
  </style>
</head>
<body data-default-lang="en">
  <a class="back" href="/en.html" data-i18n="backLink">← Back to the cat</a>

  <h1 data-i18n="kindnessPageTitle">💛 Good Deed of the Day</h1>
  <p class="sub" data-i18n="kindnessSub">One small action — and the world is already a little softer</p>

  <div class="card">
    <img class="cat-img" id="catImg" src="https://cataas.com/cat?width=300&height=300" alt="Cat" />
    <p class="date-label" id="dateLabel"></p>
    <div class="deed-card">
      <span class="deed-icon" id="deedIcon"></span>
      <p class="deed-text" id="deedText"></p>
      <p class="deed-hint" id="deedHint"></p>
    </div>
    <button class="done-btn" id="doneBtn" data-i18n="doneBtn">✓ I did it!</button>
    <p class="done-counter"><span data-i18n="donePeople">People who did this today:</span> <span id="doneCount">…</span> <span data-i18n="doneUnit"></span></p>
    <p class="streak-note" id="streakNote"></p>
  </div>

  <div class="badges-section" id="badgesSection">
    <p class="badges-title" data-i18n="badgesTitle">🏅 My achievements</p>
    <div class="badges-grid" id="badgesGrid"></div>
  </div>

  <div class="nav-links">
    <a class="nav-link" href="/en.html">🐾 Pet the cat</a>
    <a class="nav-link" href="/en-about.html">📖 Our story</a>
    <a class="nav-link" href="/en-changelog.html">🛠️ What's new</a>
  </div>

  <!-- badge modal -->
  <div class="badge-modal-overlay" id="badgeModal">
    <div class="badge-modal">
      <div class="modal-icon" id="modalIcon"></div>
      <p class="modal-name" id="modalName"></p>
      <p class="modal-desc" id="modalDesc"></p>
      <button class="modal-share-btn" id="modalShareBtn" data-i18n="modalShareBtn">💌 Share this achievement</button>
      <button class="modal-close" id="modalClose" data-i18n="modalClose">close</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <button class="scroll-top" id="scrollTop" title="Back to top">🐾</button>
  <footer>Purr-r-revolution · kindness is contagious · one deed at a time 💛</footer>

  <script>
    (function() {
      const h = new Date().getHours();
      if (h >= 20 || h < 6) document.body.classList.add('night-mode');
    })();

    const DEEDS = [
      { icon: '😊', text: 'Smile at a stranger', hint: 'Just smile at the first person you see. It costs nothing — and can change someone\'s day.' },
      { icon: '📞', text: 'Call someone you haven\'t called in a while', hint: 'A parent, friend, or grandparent. Just ask how they\'re doing — no reason needed.' },
      { icon: '🍵', text: 'Treat someone to tea or coffee', hint: 'A colleague, neighbor, or someone nearby. A small gesture — a big warmth.' },
      { icon: '💌', text: 'Send someone a kind message', hint: 'One sincere "you\'re great" or "I\'m glad you exist" — that\'s already a revolution.' },
      { icon: '🐱', text: 'Feed a stray cat or bird', hint: 'Bring a little food on your walk. They\'re always grateful.' },
      { icon: '🌿', text: 'Pick up litter outside', hint: 'One bag, one bottle. The world is instantly a little cleaner.' },
      { icon: '🤝', text: 'Help someone with heavy bags', hint: 'Hold the door, help carry, offer your seat.' },
      { icon: '🙏', text: 'Say thank you to someone long overdue', hint: 'A cashier, driver, friend. A sincere thank you is always surprising and warm.' },
      { icon: '🎁', text: 'Give someone a small surprise', hint: 'A note on the fridge, a flower, a favorite candy. For no reason — just because.' },
      { icon: '👂', text: 'Truly listen to someone', hint: 'Without looking at your phone. Just being present and listening — that\'s a rare gift.' },
      { icon: '🌟', text: 'Tell someone something good about them', hint: 'Not flattery — something sincere you\'ve noticed but never said.' },
      { icon: '🏠', text: 'Help a neighbor with something', hint: 'Bring in a package, help with a door, just say hello like a human.' },
      { icon: '📚', text: 'Share something useful with a friend', hint: 'A book, article, video, recipe — something that inspired you.' },
      { icon: '🌸', text: 'Give someone a flower or plant', hint: 'A lilac branch, wildflower, small cactus. Living beauty is always a joy.' },
      { icon: '💛', text: 'Forgive someone', hint: 'You don\'t have to say it out loud. Just let it go inside — it gets lighter for both of you.' },
      { icon: '🎶', text: 'Share your favorite music', hint: 'Send a friend a song that lifts you up. Music is the best gift for no occasion.' },
      { icon: '🤗', text: 'Hug someone', hint: 'Long and real. Scientists say you need at least 8 hugs a day.' },
      { icon: '🌍', text: 'Do something for nature', hint: 'Plant a seed, water a tree, skip single-use plastic today.' },
      { icon: '✍️', text: 'Write a letter to your future self', hint: 'What do you want to remember in a year? This is kindness — to yourself.' },
      { icon: '🐾', text: 'Pass the cat on to someone', hint: 'Share this site with someone who needs a little warmth right now.' },
    ];

    const BADGES = [
      { id: 'b3',   streak: 3,   icon: '🌱', name: 'Seed of Kindness',       desc: '3 days in a row — something is starting to grow 🌱' },
      { id: 'b7',   streak: 7,   icon: '🌸', name: 'Week of Warmth',          desc: '7 days in a row — a whole week of small revolutions!' },
      { id: 'b14',  streak: 14,  icon: '✨', name: 'Fortnight of Light',      desc: '14 days — you\'re already changing the world around you ✨' },
      { id: 'b21',  streak: 21,  icon: '🔥', name: 'The Flame Burns On',      desc: '21 days — the habit of doing good is almost wired in!' },
      { id: 'b30',  streak: 30,  icon: '🏅', name: 'Month of Revolution',     desc: '30 days! The cat solemnly awards you this medal 🏅' },
      { id: 'b60',  streak: 60,  icon: '🦋', name: 'Agent of Change',         desc: '60 days — you\'re a true agent of the quiet revolution 🦋' },
      { id: 'b100', streak: 100, icon: '👑', name: 'The Cat Is Proud of You', desc: '100 days of kindness. A legend. The cat is crying with joy 👑' },
    ];

    const d = new Date();
    const seed = d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
    const deed = DEEDS[seed % DEEDS.length];
    document.getElementById('deedIcon').textContent = deed.icon;
    document.getElementById('deedText').textContent = deed.text;
    document.getElementById('deedHint').textContent = deed.hint;

    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('dateLabel').textContent = `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;

    const today = d.toISOString().slice(0, 10);
    const countKey = 'kindness_count_' + today;
    let doneCount = parseInt(localStorage.getItem(countKey) || '0');
    const baseCount = 7 + (seed % 23);
    document.getElementById('doneCount').textContent = baseCount + doneCount;

    const doneKey = 'kindness_done_' + today;
    const doneBtn = document.getElementById('doneBtn');
    if (localStorage.getItem(doneKey)) {
      doneBtn.textContent = '✓ Already done today!';
      doneBtn.classList.add('did-it');
    }

    function getEarnedIds() {
      try { return JSON.parse(localStorage.getItem('kindness_badges') || '[]'); } catch(e) { return []; }
    }
    function saveEarnedIds(ids) { localStorage.setItem('kindness_badges', JSON.stringify(ids)); }

    function renderBadges(newIds) {
      newIds = newIds || [];
      const earned = getEarnedIds();
      const grid = document.getElementById('badgesGrid');
      grid.innerHTML = '';
      const streakSuffix = window.I18N_T ? window.I18N_T('badgeStreakSuffix') : 'days in a row';
      if (earned.length === 0) {
        const streak = parseInt(localStorage.getItem('kindness_streak') || '0');
        const last = localStorage.getItem('kindness_streak_last');
        const todayStr = new Date().toISOString().slice(0, 10);
        const hasStarted = streak >= 1 && last === todayStr;
        const emptyKey = hasStarted ? 'badgesEmptyStarted' : 'badgesEmptyFirst';
        const emptyText = window.I18N_T ? window.I18N_T(emptyKey) : (hasStarted
          ? 'Great start! First badge "Seed of Kindness" 🌱 — come back 3 days in a row'
          : 'Do your first good deed — and your achievements will appear here 💛');
        grid.innerHTML = '<p class="badges-empty">' + emptyText + '</p>';
        return;
      }
      BADGES.forEach(b => {
        const isEarned = earned.includes(b.id);
        const isNew = newIds.indexOf(b.id) !== -1;
        const card = document.createElement('div');
        card.className = 'badge-card' + (isEarned ? ' earned' : ' locked') + (isNew ? ' badge-animate' : '');
        card.innerHTML = `<div class="badge-icon">${b.icon}</div><div class="badge-name">${b.name}</div><div class="badge-req">${b.streak} ${streakSuffix}</div>` + (isNew ? `<span class="badge-new-ribbon">${window.I18N_T ? window.I18N_T('badgeNew') : 'NEW'}</span>` : '');
        if (isEarned) card.addEventListener('click', () => openModal(b));
        grid.appendChild(card);
      });
    }

    function checkNewBadges(streak) {
      const earned = getEarnedIds();
      const newIds = [];
      let newBadge = null;
      BADGES.forEach(b => {
        if (streak >= b.streak && !earned.includes(b.id)) {
          earned.push(b.id);
          newIds.push(b.id);
          newBadge = b;
        }
      });
      saveEarnedIds(earned);
      checkNewBadges._lastNewIds = newIds;
      return newBadge;
    }

    let currentModalBadge = null;
    function openModal(badge) {
      currentModalBadge = badge;
      document.getElementById('modalIcon').textContent = badge.icon;
      document.getElementById('modalName').textContent = badge.name;
      document.getElementById('modalDesc').textContent = badge.desc;
      document.getElementById('badgeModal').classList.add('open');
    }
    document.getElementById('modalClose').addEventListener('click', () => {
      document.getElementById('badgeModal').classList.remove('open');
    });
    document.getElementById('badgeModal').addEventListener('click', e => {
      if (e.target === document.getElementById('badgeModal'))
        document.getElementById('badgeModal').classList.remove('open');
    });
    document.getElementById('modalShareBtn').addEventListener('click', () => {
      if (!currentModalBadge) return;
      const text = `I earned the "${currentModalBadge.name}" badge ${currentModalBadge.icon} on Purr-r-revolution!\n${currentModalBadge.desc}\nhttps://mur-r-revolyutsiya.onrender.com/en-kindness.html`;
      navigator.clipboard.writeText(text).then(() => showToast('Copied! Now go share it 💛'));
    });

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }
    function burst() {
      const emojis = ['💛','🐾','💛','🌸','💛','😻','💛'];
      for (let i = 0; i < 12; i++) {
        setTimeout(() => {
          const h = document.createElement('span');
          h.className = 'float-heart';
          h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          h.style.left = (10 + Math.random() * 80) + '%';
          h.style.top  = (20 + Math.random() * 60) + '%';
          document.body.appendChild(h);
          setTimeout(() => h.remove(), 1050);
        }, i * 80);
      }
    }

    doneBtn.addEventListener('click', () => {
      if (localStorage.getItem(doneKey)) {
        showToast(window.I18N_T('kittyAlready') || 'The cat already knows — you\'re wonderful! 💛');
        return;
      }
      localStorage.setItem(doneKey, '1');
      doneCount++;
      localStorage.setItem(countKey, doneCount);
      document.getElementById('doneCount').textContent = baseCount + doneCount;
      doneBtn.textContent = '✓ Already done today!';
      doneBtn.classList.add('did-it');

      const yesterday = new Date(Date.now() - 864e5).toISOString().slice(0, 10);
      const last = localStorage.getItem('kindness_streak_last');
      let streak = parseInt(localStorage.getItem('kindness_streak') || '0');
      if (last === yesterday) { streak++; } else { streak = 1; }
      localStorage.setItem('kindness_streak', streak);
      localStorage.setItem('kindness_streak_last', today);

      const streakEl = document.getElementById('streakNote');
      if (streak >= 2) {
        streakEl.textContent = `🔥 ${streak} days of kindness in a row!`;
      } else {
        streakEl.textContent = '✨ First step — already a revolution!';
      }

      const newBadge = checkNewBadges(streak);
      renderBadges(checkNewBadges._lastNewIds || []);

      document.getElementById('catImg').classList.add('happy');
      setTimeout(() => document.getElementById('catImg').classList.remove('happy'), 600);
      burst();

      if (newBadge) {
        setTimeout(() => {
          openModal(newBadge);
          showToast(`New badge: ${newBadge.name} ${newBadge.icon}`);
        }, 600);
      } else {
        setTimeout(() => showToast(window.I18N_T('kittyProud') || 'The cat is proud of you! 🐱💛'), 400);
      }
    });

    (function() {
      const streak = parseInt(localStorage.getItem('kindness_streak') || '0');
      const last = localStorage.getItem('kindness_streak_last');
      if (streak >= 2 && last === today) {
        document.getElementById('streakNote').textContent =
          `🔥 ${streak} days of kindness in a row!`;
      }
      renderBadges([]);
    })();

    (function() {
      const btn = document.getElementById('scrollTop');
      window.addEventListener('scroll', () => btn.classList.toggle('visible', window.scrollY > 280), { passive: true });
      btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    })();
  </script>
  <script src="/i18n.js"></script>
</body>
</html>
